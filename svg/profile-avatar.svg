<svg width="100%" viewBox="0 0 940 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .a rect { fill: #eef4ff; stroke: #34559a; }
      .b rect { fill: #edf9f2; stroke: #24734c; }
      .c rect { fill: #fff6e8; stroke: #915d15; }
      .arr { stroke: #66645d; stroke-width: 1.6; fill: none; }
      .sep { stroke: #b8b5ac; stroke-width: 1; stroke-dasharray: 5 4; }
      .cap { font-size: 12px; fill: #57564f; font-weight: 700; }
    </style>
  </defs>

  <text class="title" x="470" y="42" text-anchor="middle">Profile and Avatar Flow</text>

  <line x1="470" y1="80" x2="470" y2="660" class="sep"/>
  <text class="cap" x="235" y="86" text-anchor="middle">PATCH /api/profile</text>
  <text class="cap" x="705" y="86" text-anchor="middle">POST /api/profile/avatar</text>

  <g class="a">
    <rect x="70" y="120" width="330" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="235" y="148" text-anchor="middle">User updates displayName/email</text>
    <text class="s" x="235" y="171" text-anchor="middle">Submit JSON payload</text>
  </g>

  <g class="b">
    <rect x="70" y="224" width="330" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="235" y="252" text-anchor="middle">Validate JWT and profile schema</text>
    <text class="s" x="235" y="275" text-anchor="middle">Ownership enforced by auth.uid()</text>
  </g>

  <g class="c">
    <rect x="70" y="328" width="330" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="235" y="356" text-anchor="middle">Update users table</text>
    <text class="s" x="235" y="379" text-anchor="middle">display_name, email, updated_at</text>
  </g>

  <g class="a">
    <rect x="70" y="432" width="330" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="235" y="460" text-anchor="middle">Return updated profile envelope</text>
    <text class="s" x="235" y="483" text-anchor="middle">ApiResponse&lt;UserProfile&gt;</text>
  </g>

  <g class="a">
    <rect x="540" y="120" width="330" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="705" y="148" text-anchor="middle">User uploads avatar file</text>
    <text class="s" x="705" y="171" text-anchor="middle">multipart/form-data (jpg/png/webp)</text>
  </g>

  <g class="b">
    <rect x="540" y="224" width="330" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="705" y="252" text-anchor="middle">Validate size and mime type</text>
    <text class="s" x="705" y="275" text-anchor="middle">max 2MB, authenticated user only</text>
  </g>

  <g class="c">
    <rect x="540" y="328" width="330" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="705" y="356" text-anchor="middle">Upload to Supabase Storage bucket</text>
    <text class="s" x="705" y="379" text-anchor="middle">Generate public avatar URL</text>
  </g>

  <g class="b">
    <rect x="540" y="432" width="330" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="705" y="460" text-anchor="middle">Save avatar_url in users profile</text>
    <text class="s" x="705" y="483" text-anchor="middle">Return ApiResponse&lt;{ avatar_url }&gt;</text>
  </g>

  <line x1="235" y1="192" x2="235" y2="224" class="arr" marker-end="url(#arrow)"/>
  <line x1="235" y1="296" x2="235" y2="328" class="arr" marker-end="url(#arrow)"/>
  <line x1="235" y1="400" x2="235" y2="432" class="arr" marker-end="url(#arrow)"/>

  <line x1="705" y1="192" x2="705" y2="224" class="arr" marker-end="url(#arrow)"/>
  <line x1="705" y1="296" x2="705" y2="328" class="arr" marker-end="url(#arrow)"/>
  <line x1="705" y1="400" x2="705" y2="432" class="arr" marker-end="url(#arrow)"/>
</svg>