<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; font-weight: 400; }

      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray text { fill: #444441; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple text { fill: #3C3489; }
      .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
      .c-red text { fill: #791F1F; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal text { fill: #085041; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber text { fill: #633806; }
      .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green text { fill: #27500A; }

      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      line.div { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 4 4; opacity: 0.4; }
      line.sep { stroke: #888780; stroke-width: 0.5; opacity: 0.2; }
    </style>
  </defs>

  <g class="c-gray">
    <rect x="40" y="20" width="270" height="34" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="37" text-anchor="middle" dominant-baseline="central">No RAG</text>
  </g>

  <g class="c-gray">
    <rect x="60" y="76" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="92" text-anchor="middle" dominant-baseline="central">User asks</text>
    <text class="ts" x="175" y="110" text-anchor="middle" dominant-baseline="central">BTC status today?</text>
  </g>

  <line x1="175" y1="120" x2="175" y2="148" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="60" y="150" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="166" text-anchor="middle" dominant-baseline="central">LLM guesses</text>
    <text class="ts" x="175" y="184" text-anchor="middle" dominant-baseline="central">Old pretraining data</text>
  </g>

  <line x1="175" y1="194" x2="175" y2="222" class="arr" marker-end="url(#arrow)"/>

  <g class="c-red">
    <rect x="60" y="224" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="240" text-anchor="middle" dominant-baseline="central">Outdated answer</text>
    <text class="ts" x="175" y="258" text-anchor="middle" dominant-baseline="central">Hallucination risk</text>
  </g>

  <line x1="340" y1="20" x2="340" y2="290" class="div"/>

  <g class="c-teal">
    <rect x="370" y="20" width="270" height="34" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="37" text-anchor="middle" dominant-baseline="central">With RAG</text>
  </g>

  <g class="c-gray">
    <rect x="390" y="76" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="92" text-anchor="middle" dominant-baseline="central">User asks</text>
    <text class="ts" x="505" y="110" text-anchor="middle" dominant-baseline="central">BTC status today?</text>
  </g>

  <line x1="505" y1="120" x2="505" y2="148" class="arr" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="390" y="150" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="166" text-anchor="middle" dominant-baseline="central">Fetch relevant data</text>
    <text class="ts" x="505" y="184" text-anchor="middle" dominant-baseline="central">News + trade records</text>
  </g>

  <line x1="505" y1="194" x2="505" y2="222" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="390" y="224" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="240" text-anchor="middle" dominant-baseline="central">LLM gets context</text>
    <text class="ts" x="505" y="258" text-anchor="middle" dominant-baseline="central">Grounded generation</text>
  </g>

  <line x1="505" y1="268" x2="505" y2="296" class="arr" marker-end="url(#arrow)"/>

  <g class="c-green">
    <rect x="390" y="298" width="230" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="314" text-anchor="middle" dominant-baseline="central">Accurate answer</text>
    <text class="ts" x="505" y="332" text-anchor="middle" dominant-baseline="central">With source-backed facts</text>
  </g>

  <line x1="40" y1="370" x2="640" y2="370" class="sep"/>

  <text class="th" x="340" y="400" text-anchor="middle" dominant-baseline="central" style="fill:#1a1a1a">Trading app: 2 RAG options</text>

  <g class="c-amber">
    <rect x="40" y="420" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="180" y="440" text-anchor="middle" dominant-baseline="central">Static RAG (Vector DB)</text>
    <text class="ts" x="180" y="460" text-anchor="middle" dominant-baseline="central">Ingest and index documents</text>
  </g>

  <g class="c-teal">
    <rect x="360" y="420" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="440" text-anchor="middle" dominant-baseline="central">Dynamic RAG (Tool calling)</text>
    <text class="ts" x="500" y="460" text-anchor="middle" dominant-baseline="central">Query fresh data at runtime</text>
  </g>

  <text class="ts" x="180" y="498" text-anchor="middle" dominant-baseline="central" style="fill:#5F5E5A">Higher setup cost</text>
  <text class="ts" x="500" y="498" text-anchor="middle" dominant-baseline="central" style="fill:#5F5E5A">Faster to iterate</text>

  <g class="c-red">
    <rect x="84" y="510" width="192" height="28" rx="6" stroke-width="0.5"/>
    <text class="th" x="180" y="524" text-anchor="middle" dominant-baseline="central">Can be overkill</text>
  </g>

  <g class="c-green">
    <rect x="404" y="510" width="192" height="28" rx="6" stroke-width="0.5"/>
    <text class="th" x="500" y="524" text-anchor="middle" dominant-baseline="central">Recommended here</text>
  </g>
</svg>