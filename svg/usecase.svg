<svg width="100%" viewBox="0 0 980 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .actor { font-size: 14px; font-weight: 700; }
      .h { font-size: 14px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .uc rect { fill: #eef5ff; stroke: #2f5496; }
      .api rect { fill: #eefaf4; stroke: #23724a; }
      .arr { stroke: #65645d; stroke-width: 1.5; fill: none; }
      .frame { fill: #fbfaf7; stroke: #8c8a81; }
    </style>
  </defs>

  <text class="title" x="490" y="42" text-anchor="middle">Use Case Flow Map</text>

  <rect x="140" y="90" width="700" height="500" rx="14" class="frame" stroke-width="1.2"/>
  <text class="h" x="490" y="120" text-anchor="middle">aiTrackProfit Core Use Cases</text>

  <circle cx="80" cy="290" r="28" fill="#f4efe7" stroke="#7a756d" stroke-width="1.2"/>
  <line x1="80" y1="318" x2="80" y2="370" stroke="#7a756d" stroke-width="1.2"/>
  <line x1="56" y1="340" x2="104" y2="340" stroke="#7a756d" stroke-width="1.2"/>
  <line x1="80" y1="370" x2="56" y2="408" stroke="#7a756d" stroke-width="1.2"/>
  <line x1="80" y1="370" x2="104" y2="408" stroke="#7a756d" stroke-width="1.2"/>
  <text class="actor" x="80" y="432" text-anchor="middle">Trader</text>

  <g class="uc">
