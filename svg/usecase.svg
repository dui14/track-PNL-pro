    <text class="s" x="320" y="380" text-anchor="middle">Summary, chart, calendar, trade list</text>
  </g>

  <g class="uc">
    <rect x="190" y="420" width="260" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="320" y="447" text-anchor="middle">Demo Trading</text>
    <text class="s" x="320" y="470" text-anchor="middle">Open and close paper positions</text>
  </g>

  <g class="uc">
    <rect x="190" y="510" width="260" height="60" rx="10" stroke-width="1.1"/>
