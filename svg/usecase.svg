    <text class="h" x="320" y="177" text-anchor="middle">Connect Exchange</text>
    <text class="s" x="320" y="200" text-anchor="middle">Save encrypted API key set</text>
  </g>

  <g class="uc">
    <rect x="190" y="240" width="260" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="320" y="267" text-anchor="middle">Sync Trade History</text>
    <text class="s" x="320" y="290" text-anchor="middle">Normalize trades and refresh PNL</text>
  </g>

  <g class="uc">
