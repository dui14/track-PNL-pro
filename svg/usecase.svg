  <line x1="108" y1="280" x2="190" y2="275" class="arr" marker-end="url(#arrow)"/>
  <line x1="108" y1="300" x2="190" y2="365" class="arr" marker-end="url(#arrow)"/>
  <line x1="108" y1="320" x2="190" y2="455" class="arr" marker-end="url(#arrow)"/>
  <line x1="108" y1="340" x2="190" y2="540" class="arr" marker-end="url(#arrow)"/>

  <line x1="450" y1="185" x2="520" y2="220" class="arr" marker-end="url(#arrow)"/>
  <line x1="450" y1="275" x2="520" y2="220" class="arr" marker-end="url(#arrow)"/>
  <line x1="450" y1="365" x2="520" y2="330" class="arr" marker-end="url(#arrow)"/>
  <line x1="450" y1="455" x2="520" y2="330" class="arr" marker-end="url(#arrow)"/>
  <line x1="450" y1="540" x2="520" y2="330" class="arr" marker-end="url(#arrow)"/>

  <line x1="660" y1="260" x2="660" y2="290" class="arr" marker-end="url(#arrow)"/>
  <line x1="660" y1="370" x2="660" y2="400" class="arr" marker-end="url(#arrow)"/>
