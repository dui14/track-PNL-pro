<svg width="100%" viewBox="0 0 860 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .proc rect { fill: #eef4ff; stroke: #33559a; }
      .io rect { fill: #edf9f2; stroke: #24734c; }
      .calc rect { fill: #fff6e8; stroke: #915b13; }
      .err rect { fill: #feecec; stroke: #9b3030; }
      .arr { stroke: #66645e; stroke-width: 1.6; fill: none; }
      .dash { stroke-dasharray: 5 4; }
    </style>
  </defs>

  <text class="title" x="430" y="42" text-anchor="middle">Exchange Sync Flow</text>

  <g class="proc">
    <rect x="220" y="70" width="420" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="430" y="96" text-anchor="middle">User clicks Sync Now</text>
    <text class="s" x="430" y="118" text-anchor="middle">POST /api/exchange/sync { exchangeAccountId }</text>
  </g>

  <g class="proc">
    <rect x="220" y="158" width="420" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="430" y="184" text-anchor="middle">Application checks JWT and ownership</text>
    <text class="s" x="430" y="206" text-anchor="middle">Load encrypted key bundle from DB</text>
  </g>

  <g class="io">
    <rect x="220" y="246" width="420" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="430" y="272" text-anchor="middle">Decrypt key + secret in server context</text>
    <text class="s" x="430" y="294" text-anchor="middle">AES-256-GCM with IV and key version</text>
  </g>

  <g class="io">
    <rect x="220" y="334" width="420" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="430" y="362" text-anchor="middle">ExchangeAdapter.fetchTrades()</text>
    <text class="s" x="430" y="385" text-anchor="middle">Rate limit + retry backoff for 429 and transient failures</text>
  </g>

  <g class="calc">
    <rect x="220" y="432" width="420" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="430" y="460" text-anchor="middle">Normalize + calculate realized PNL</text>
    <text class="s" x="430" y="483" text-anchor="middle">Map exchange payload to internal Trade schema</text>
  </g>

  <g class="io">
    <rect x="220" y="530" width="420" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="430" y="558" text-anchor="middle">Upsert trades and rebuild pnl snapshots</text>
    <text class="s" x="430" y="581" text-anchor="middle">trades + pnl_snapshots + exchange_accounts.last_synced</text>
  </g>

  <g class="proc">
    <rect x="220" y="628" width="420" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="430" y="656" text-anchor="middle">Response with sync stats</text>
    <text class="s" x="430" y="679" text-anchor="middle">synced_trades, new_trades, last_synced</text>
  </g>

  <g class="err">
    <rect x="680" y="334" width="150" height="88" rx="10" stroke-width="1.1"/>
    <text class="h" x="755" y="365" text-anchor="middle">Sync Error</text>
    <text class="s" x="755" y="388" text-anchor="middle">502 EXCHANGE_ERROR</text>
    <text class="s" x="755" y="407" text-anchor="middle">or 500 INTERNAL</text>
  </g>

  <line x1="430" y1="134" x2="430" y2="158" class="arr" marker-end="url(#arrow)"/>
  <line x1="430" y1="222" x2="430" y2="246" class="arr" marker-end="url(#arrow)"/>
  <line x1="430" y1="310" x2="430" y2="334" class="arr" marker-end="url(#arrow)"/>
  <line x1="430" y1="408" x2="430" y2="432" class="arr" marker-end="url(#arrow)"/>
  <line x1="430" y1="506" x2="430" y2="530" class="arr" marker-end="url(#arrow)"/>
  <line x1="430" y1="604" x2="430" y2="628" class="arr" marker-end="url(#arrow)"/>

  <line x1="640" y1="371" x2="680" y2="371" class="arr dash" marker-end="url(#arrow)"/>
</svg>