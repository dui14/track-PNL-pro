<svg width="100%" viewBox="0 0 820 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .a rect { fill: #eef4ff; stroke: #33549a; }
      .b rect { fill: #edf9f1; stroke: #24734b; }
      .c rect { fill: #fff6e8; stroke: #8f5b14; }
      .arr { stroke: #66645d; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <text class="title" x="410" y="42" text-anchor="middle">PNL Calendar Flow</text>

  <g class="a">
    <rect x="210" y="78" width="400" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="104" text-anchor="middle">PNLCalendar component mounts</text>
    <text class="s" x="410" y="126" text-anchor="middle">range=daily or monthly, year, month</text>
  </g>

  <g class="a">
    <rect x="210" y="172" width="400" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="198" text-anchor="middle">GET /api/pnl/calendar</text>
    <text class="s" x="410" y="220" text-anchor="middle">PNLCalendarQuerySchema.safeParse(query)</text>
  </g>

  <g class="b">
    <rect x="210" y="266" width="400" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="294" text-anchor="middle">fetchPNLCalendar(userId, view, year, month)</text>
    <text class="s" x="410" y="317" text-anchor="middle">Compute date window and fetch candidate trades</text>
  </g>

  <g class="c">
    <rect x="210" y="370" width="400" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="398" text-anchor="middle">buildPNLCalendarDays / buildPNLCalendarMonths</text>
    <text class="s" x="410" y="421" text-anchor="middle">Aggregate pnl and tradeCount by date bucket</text>
  </g>

  <g class="b">
    <rect x="210" y="474" width="400" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="502" text-anchor="middle">Return ApiResponse&lt;CalendarData[]&gt;</text>
    <text class="s" x="410" y="525" text-anchor="middle">Each item has date key + pnl + hasData</text>
  </g>

  <g class="a">
    <rect x="210" y="578" width="400" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="606" text-anchor="middle">Client renders heatmap grid</text>
    <text class="s" x="410" y="629" text-anchor="middle">Positive pnl green, negative pnl red, empty neutral</text>
  </g>

  <line x1="410" y1="142" x2="410" y2="172" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="236" x2="410" y2="266" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="340" x2="410" y2="370" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="444" x2="410" y2="474" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="548" x2="410" y2="578" class="arr" marker-end="url(#arrow)"/>
</svg>