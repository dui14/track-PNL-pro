<svg width="100%" viewBox="0 0 820 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .a rect { fill: #eef4ff; stroke: #33549a; }
      .b rect { fill: #edf9f2; stroke: #24734b; }
      .c rect { fill: #fff6e8; stroke: #905c15; }
      .err rect { fill: #feecec; stroke: #9a3030; }
      .arr { stroke: #66645e; stroke-width: 1.6; fill: none; }
      .dash { stroke-dasharray: 5 4; }
    </style>
  </defs>

  <text class="title" x="410" y="42" text-anchor="middle">Demo Order Close Flow</text>

  <g class="a">
    <rect x="220" y="74" width="380" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="100" text-anchor="middle">User closes an open position</text>
    <text class="s" x="410" y="122" text-anchor="middle">tradeId + exitPrice from live market</text>
  </g>

  <g class="a">
    <rect x="220" y="166" width="380" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="192" text-anchor="middle">PATCH /api/demo/order</text>
    <text class="s" x="410" y="214" text-anchor="middle">CloseDemoOrderSchema + JWT check</text>
  </g>

  <g class="b">
    <rect x="220" y="258" width="380" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="286" text-anchor="middle">Load open trade by user ownership</text>
    <text class="s" x="410" y="309" text-anchor="middle">Reject if trade not found or not open</text>
  </g>

  <g class="err">
    <rect x="40" y="374" width="250" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="165" y="402" text-anchor="middle">Close failed</text>
    <text class="s" x="165" y="425" text-anchor="middle">404 NOT_FOUND or 400 INVALID_STATE</text>
  </g>

  <g class="c">
    <rect x="320" y="374" width="460" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="550" y="402" text-anchor="middle">calculateDemoRealizedPNL(trade, exitPrice)</text>
    <text class="s" x="550" y="425" text-anchor="middle">realizedPnl, close timestamp, status=closed</text>
  </g>

  <g class="b">
    <rect x="320" y="474" width="460" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="550" y="502" text-anchor="middle">Update demo_trades + return margin and pnl</text>
    <text class="s" x="550" y="525" text-anchor="middle">newBalance = oldBalance + margin + realizedPnl</text>
  </g>

  <g class="a">
    <rect x="220" y="574" width="380" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="410" y="602" text-anchor="middle">Response with closed trade payload</text>
    <text class="s" x="410" y="625" text-anchor="middle">Frontend refreshes open/closed tabs and balance</text>
  </g>

  <line x1="410" y1="138" x2="410" y2="166" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="230" x2="410" y2="258" class="arr" marker-end="url(#arrow)"/>
  <line x1="410" y1="332" x2="410" y2="374" class="arr" marker-end="url(#arrow)"/>

  <line x1="320" y1="410" x2="290" y2="410" class="arr" marker-end="url(#arrow)"/>
  <line x1="550" y1="446" x2="550" y2="474" class="arr" marker-end="url(#arrow)"/>
  <line x1="550" y1="546" x2="460" y2="574" class="arr dash" marker-end="url(#arrow)"/>

  <text class="s" x="418" y="361">trade open and owned?</text>
</svg>