<svg width="100%" viewBox="0 0 780 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .a rect { fill: #eef4ff; stroke: #34559a; }
      .b rect { fill: #edf9f2; stroke: #24734c; }
      .c rect { fill: #fff6e9; stroke: #946016; }
      .err rect { fill: #feecec; stroke: #9f3030; }
      .arr { stroke: #65645e; stroke-width: 1.6; fill: none; }
      .dash { stroke-dasharray: 5 4; }
    </style>
  </defs>

  <text class="title" x="390" y="42" text-anchor="middle">Exchange Connect Flow</text>

  <g class="a">
    <rect x="210" y="74" width="360" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="390" y="100" text-anchor="middle">User submits connect form</text>
    <text class="s" x="390" y="122" text-anchor="middle">exchange, apiKey, apiSecret, label</text>
  </g>

  <g class="a">
    <rect x="210" y="166" width="360" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="390" y="192" text-anchor="middle">POST /api/exchange/connect</text>
    <text class="s" x="390" y="214" text-anchor="middle">JWT check + Zod validation</text>
  </g>

  <g class="c">
    <rect x="210" y="258" width="360" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="390" y="286" text-anchor="middle">Verify API credentials at exchange</text>
    <text class="s" x="390" y="309" text-anchor="middle">Call test endpoint with read-only permission</text>
  </g>

  <g class="err">
    <rect x="40" y="374" width="250" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="165" y="402" text-anchor="middle">Connect failed</text>
    <text class="s" x="165" y="425" text-anchor="middle">400 VALIDATION_ERROR / 502 EXCHANGE_ERROR</text>
  </g>

  <g class="b">
    <rect x="320" y="374" width="420" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="530" y="402" text-anchor="middle">Encrypt key and secret (AES-256-GCM)</text>
    <text class="s" x="530" y="425" text-anchor="middle">Generate IV per secret, assign key_version</text>
  </g>

  <g class="b">
    <rect x="320" y="474" width="420" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="530" y="502" text-anchor="middle">Insert records to Supabase</text>
    <text class="s" x="530" y="525" text-anchor="middle">exchange_accounts + api_keys (encrypted only)</text>
  </g>

  <g class="a">
    <rect x="210" y="574" width="360" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="390" y="602" text-anchor="middle">Return account metadata only</text>
    <text class="s" x="390" y="625" text-anchor="middle">No raw API keys in any response</text>
  </g>

  <line x1="390" y1="138" x2="390" y2="166" class="arr" marker-end="url(#arrow)"/>
  <line x1="390" y1="230" x2="390" y2="258" class="arr" marker-end="url(#arrow)"/>
  <line x1="390" y1="332" x2="390" y2="374" class="arr" marker-end="url(#arrow)"/>

  <line x1="320" y1="410" x2="290" y2="410" class="arr" marker-end="url(#arrow)"/>
  <line x1="530" y1="446" x2="530" y2="474" class="arr" marker-end="url(#arrow)"/>
  <line x1="530" y1="546" x2="440" y2="574" class="arr dash" marker-end="url(#arrow)"/>

  <text class="s" x="398" y="362">credential valid?</text>
</svg>