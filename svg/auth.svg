<svg width="100%" viewBox="0 0 760 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .ok rect { fill: #eaf6ef; stroke: #1f6c4a; }
      .proc rect { fill: #eef3ff; stroke: #325393; }
      .warn rect { fill: #fff0f0; stroke: #993232; }
      .arr { stroke: #66645d; stroke-width: 1.6; fill: none; }
      .dash { stroke-dasharray: 5 4; }
    </style>
  </defs>

  <text class="title" x="380" y="42" text-anchor="middle">Authentication Flow</text>

  <g class="proc">
    <rect x="220" y="80" width="320" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="380" y="106" text-anchor="middle">User opens protected page</text>
    <text class="s" x="380" y="128" text-anchor="middle">/dashboard, /demo-trading, /ai-assistant</text>
  </g>

  <g class="proc">
    <rect x="220" y="176" width="320" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="380" y="202" text-anchor="middle">Next.js middleware checks session</text>
    <text class="s" x="380" y="224" text-anchor="middle">supabase.auth.getUser() from JWT cookie</text>
  </g>

  <g class="warn">
    <rect x="40" y="286" width="260" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="170" y="314" text-anchor="middle">Invalid or missing JWT</text>
    <text class="s" x="170" y="337" text-anchor="middle">Redirect to /login</text>
  </g>

  <g class="proc">
    <rect x="340" y="286" width="360" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="520" y="314" text-anchor="middle">User signs in</text>
    <text class="s" x="520" y="337" text-anchor="middle">Google OAuth or Email/Password via Supabase Auth</text>
  </g>

  <g class="proc">
    <rect x="340" y="392" width="360" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="520" y="420" text-anchor="middle">Auth callback exchanges code/token</text>
    <text class="s" x="520" y="443" text-anchor="middle">Set session cookie and return to app</text>
  </g>

  <g class="ok">
    <rect x="220" y="498" width="320" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="380" y="526" text-anchor="middle">Authorized request path</text>
    <text class="s" x="380" y="549" text-anchor="middle">API routes re-check JWT and proceed</text>
  </g>

  <line x1="380" y1="144" x2="380" y2="176" class="arr" marker-end="url(#arrow)"/>
  <line x1="380" y1="240" x2="380" y2="286" class="arr" marker-end="url(#arrow)"/>
  <line x1="380" y1="360" x2="380" y2="498" class="arr dash" marker-end="url(#arrow)"/>

  <line x1="300" y1="323" x2="340" y2="323" class="arr" marker-end="url(#arrow)"/>
  <line x1="520" y1="360" x2="520" y2="392" class="arr" marker-end="url(#arrow)"/>
  <line x1="520" y1="466" x2="430" y2="498" class="arr" marker-end="url(#arrow)"/>

  <text class="s" x="390" y="273">session valid?</text>
</svg>