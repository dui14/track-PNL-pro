<svg width="100%" viewBox="0 0 940 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .ui rect { fill: #eef4ff; stroke: #34559a; }
      .api rect { fill: #edf9f2; stroke: #24734c; }
      .llm rect { fill: #fff6e8; stroke: #915d15; }
      .db rect { fill: #f7eefc; stroke: #663296; }
      .arr { stroke: #66645d; stroke-width: 1.6; fill: none; }
      .lane { fill: none; stroke: #b7b4aa; stroke-dasharray: 5 4; }
      .cap { font-size: 11px; fill: #57564f; }
    </style>
  </defs>

  <text class="title" x="470" y="42" text-anchor="middle">AI Chat SSE Flow</text>

  <rect x="40" y="70" width="230" height="640" class="lane"/>
  <rect x="300" y="70" width="300" height="640" class="lane"/>
  <rect x="630" y="70" width="270" height="640" class="lane"/>
  <text class="cap" x="155" y="92" text-anchor="middle">Client</text>
  <text class="cap" x="450" y="92" text-anchor="middle">API and AI Service</text>
  <text class="cap" x="765" y="92" text-anchor="middle">LLM + Database</text>

  <g class="ui">
    <rect x="70" y="120" width="170" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="155" y="148" text-anchor="middle">User sends message</text>
    <text class="s" x="155" y="171" text-anchor="middle">conversationId + content</text>
  </g>

  <g class="api">
    <rect x="330" y="120" width="240" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="450" y="148" text-anchor="middle">POST /api/ai/chat</text>
    <text class="s" x="450" y="171" text-anchor="middle">JWT check + user rate limit</text>
  </g>

  <g class="db">
    <rect x="660" y="220" width="210" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="765" y="248" text-anchor="middle">Load conversation context</text>
    <text class="s" x="765" y="271" text-anchor="middle">chat_conversations + messages</text>
  </g>

  <g class="api">
    <rect x="330" y="220" width="240" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="450" y="248" text-anchor="middle">Build prompt bundle</text>
    <text class="s" x="450" y="271" text-anchor="middle">system context + history + new message</text>
  </g>

  <g class="llm">
    <rect x="660" y="330" width="210" height="82" rx="10" stroke-width="1.1"/>
    <text class="h" x="765" y="360" text-anchor="middle">Call LLM streaming API</text>
    <text class="s" x="765" y="384" text-anchor="middle">delta tokens emitted continuously</text>
  </g>

  <g class="api">
    <rect x="330" y="330" width="240" height="82" rx="10" stroke-width="1.1"/>
    <text class="h" x="450" y="360" text-anchor="middle">Forward SSE stream to client</text>
    <text class="s" x="450" y="384" text-anchor="middle">event: delta, done</text>
  </g>

  <g class="ui">
    <rect x="70" y="454" width="170" height="82" rx="10" stroke-width="1.1"/>
    <text class="h" x="155" y="484" text-anchor="middle">Render live text</text>
    <text class="s" x="155" y="508" text-anchor="middle">token by token UX</text>
  </g>

  <g class="db">
    <rect x="660" y="454" width="210" height="82" rx="10" stroke-width="1.1"/>
    <text class="h" x="765" y="484" text-anchor="middle">Persist message records</text>
    <text class="s" x="765" y="508" text-anchor="middle">user + assistant in chat_messages</text>
  </g>

  <g class="api">
    <rect x="330" y="574" width="240" height="82" rx="10" stroke-width="1.1"/>
    <text class="h" x="450" y="604" text-anchor="middle">Emit done event</text>
    <text class="s" x="450" y="628" text-anchor="middle">returns conversationId for follow-up</text>
  </g>

  <line x1="240" y1="156" x2="330" y2="156" class="arr" marker-end="url(#arrow)"/>
  <line x1="570" y1="256" x2="660" y2="256" class="arr" marker-end="url(#arrow)"/>
  <line x1="660" y1="278" x2="570" y2="278" class="arr" marker-end="url(#arrow)"/>

  <line x1="570" y1="371" x2="660" y2="371" class="arr" marker-end="url(#arrow)"/>
  <line x1="660" y1="393" x2="570" y2="393" class="arr" marker-end="url(#arrow)"/>
  <line x1="330" y1="392" x2="240" y2="495" class="arr" marker-end="url(#arrow)"/>

  <line x1="570" y1="495" x2="660" y2="495" class="arr" marker-end="url(#arrow)"/>
  <line x1="450" y1="412" x2="450" y2="574" class="arr" marker-end="url(#arrow)"/>
</svg>