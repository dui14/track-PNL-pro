<svg width="100%" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .a rect { fill: #eef4ff; stroke: #34559a; }
      .b rect { fill: #edf9f2; stroke: #23724a; }
      .c rect { fill: #fff6e8; stroke: #8f5b14; }
      .err rect { fill: #feecec; stroke: #9e3030; }
      .arr { stroke: #66645e; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <text class="title" x="400" y="42" text-anchor="middle">Demo Order Open Flow</text>

  <g class="a">
    <rect x="210" y="72" width="380" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="400" y="98" text-anchor="middle">User clicks Open Position</text>
    <text class="s" x="400" y="120" text-anchor="middle">symbol, side, orderType, leverage, margin config</text>
  </g>

  <g class="a">
    <rect x="210" y="164" width="380" height="64" rx="10" stroke-width="1.1"/>
    <text class="h" x="400" y="190" text-anchor="middle">POST /api/demo/order</text>
    <text class="s" x="400" y="212" text-anchor="middle">JWT check + PlaceDemoOrderSchema</text>
  </g>

  <g class="c">
    <rect x="210" y="256" width="380" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="400" y="284" text-anchor="middle">calculate order notional and quantity</text>
    <text class="s" x="400" y="307" text-anchor="middle">positionNotional = initialMargin * leverage</text>
  </g>

  <g class="b">
    <rect x="210" y="358" width="380" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="400" y="386" text-anchor="middle">validateDemoBalance(userBalance, orderCost)</text>
    <text class="s" x="400" y="409" text-anchor="middle">Reject when balance is insufficient</text>
  </g>

  <g class="err">
    <rect x="40" y="474" width="240" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="160" y="502" text-anchor="middle">Order rejected</text>
    <text class="s" x="160" y="525" text-anchor="middle">400 VALIDATION_ERROR</text>
  </g>

  <g class="b">
    <rect x="310" y="474" width="450" height="72" rx="10" stroke-width="1.1"/>
    <text class="h" x="535" y="502" text-anchor="middle">Insert demo_trades row and deduct balance</text>
    <text class="s" x="535" y="525" text-anchor="middle">status=open, entry_price, quantity, margin fields</text>
  </g>

  <g class="a">
    <rect x="210" y="576" width="380" height="74" rx="10" stroke-width="1.1"/>
    <text class="h" x="400" y="604" text-anchor="middle">Return created open position</text>
    <text class="s" x="400" y="627" text-anchor="middle">Frontend refreshes open list and demo balance</text>
  </g>

  <line x1="400" y1="136" x2="400" y2="164" class="arr" marker-end="url(#arrow)"/>
  <line x1="400" y1="228" x2="400" y2="256" class="arr" marker-end="url(#arrow)"/>
  <line x1="400" y1="330" x2="400" y2="358" class="arr" marker-end="url(#arrow)"/>
  <line x1="400" y1="432" x2="400" y2="474" class="arr" marker-end="url(#arrow)"/>
  <line x1="310" y1="510" x2="280" y2="510" class="arr" marker-end="url(#arrow)"/>
  <line x1="535" y1="546" x2="450" y2="576" class="arr" marker-end="url(#arrow)"/>

  <text class="s" x="408" y="462">balance ok?</text>
</svg>