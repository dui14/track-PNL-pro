<svg width="100%" viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .ui rect { fill: #eef4ff; stroke: #33559a; }
      .api rect { fill: #edf9f2; stroke: #24734c; }
      .db rect { fill: #fff6e8; stroke: #925d16; }
      .arr { stroke: #66645d; stroke-width: 1.6; fill: none; }
      .lane { fill: none; stroke: #b7b4aa; stroke-dasharray: 5 4; }
      .cap { font-size: 11px; fill: #575650; }
    </style>
  </defs>

  <text class="title" x="480" y="42" text-anchor="middle">PNL Dashboard Flow</text>

  <rect x="40" y="70" width="260" height="590" class="lane"/>
  <rect x="330" y="70" width="300" height="590" class="lane"/>
  <rect x="660" y="70" width="260" height="590" class="lane"/>
  <text class="cap" x="170" y="92" text-anchor="middle">Client UI</text>
  <text class="cap" x="480" y="92" text-anchor="middle">API and Services</text>
  <text class="cap" x="790" y="92" text-anchor="middle">Supabase</text>

  <g class="ui">
    <rect x="70" y="120" width="200" height="66" rx="10" stroke-width="1.1"/>
    <text class="h" x="170" y="146" text-anchor="middle">User opens /dashboard</text>
    <text class="s" x="170" y="168" text-anchor="middle">SSR initial load</text>
  </g>

  <g class="api">
    <rect x="360" y="120" width="240" height="66" rx="10" stroke-width="1.1"/>
    <text class="h" x="480" y="146" text-anchor="middle">Server component checks auth</text>
    <text class="s" x="480" y="168" text-anchor="middle">Supabase JWT from cookie</text>
  </g>

  <g class="api">
    <rect x="360" y="218" width="240" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="480" y="246" text-anchor="middle">fetchPNLSummary(range, exchange)</text>
    <text class="s" x="480" y="270" text-anchor="middle">Compute totals, win rate, trade count</text>
  </g>

  <g class="db">
    <rect x="690" y="218" width="200" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="790" y="246" text-anchor="middle">Read snapshots</text>
    <text class="s" x="790" y="270" text-anchor="middle">pnl_snapshots, trades</text>
  </g>

  <g class="ui">
    <rect x="70" y="330" width="200" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="170" y="358" text-anchor="middle">Client widgets mount</text>
    <text class="s" x="170" y="382" text-anchor="middle">Chart, calendar, recent trades</text>
  </g>

  <g class="api">
    <rect x="360" y="330" width="240" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="480" y="358" text-anchor="middle">GET /api/pnl/chart</text>
    <text class="s" x="480" y="382" text-anchor="middle">Time series points by range</text>
  </g>

  <g class="db">
    <rect x="690" y="330" width="200" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="790" y="358" text-anchor="middle">Read chart rows</text>
    <text class="s" x="790" y="382" text-anchor="middle">trades or snapshots</text>
  </g>

  <g class="api">
    <rect x="360" y="440" width="240" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="480" y="468" text-anchor="middle">GET /api/pnl/trades</text>
    <text class="s" x="480" y="492" text-anchor="middle">Paginated filtered trade list</text>
  </g>

  <g class="db">
    <rect x="690" y="440" width="200" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="790" y="468" text-anchor="middle">Read trade page</text>
    <text class="s" x="790" y="492" text-anchor="middle">ORDER BY traded_at DESC</text>
  </g>

  <g class="ui">
    <rect x="70" y="548" width="200" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="170" y="576" text-anchor="middle">Render dashboard</text>
    <text class="s" x="170" y="600" text-anchor="middle">Stats + charts + table</text>
  </g>

  <line x1="270" y1="153" x2="360" y2="153" class="arr" marker-end="url(#arrow)"/>
  <line x1="600" y1="256" x2="690" y2="256" class="arr" marker-end="url(#arrow)"/>
  <line x1="690" y1="278" x2="600" y2="278" class="arr" marker-end="url(#arrow)"/>

  <line x1="170" y1="186" x2="170" y2="330" class="arr" marker-end="url(#arrow)"/>
  <line x1="270" y1="368" x2="360" y2="368" class="arr" marker-end="url(#arrow)"/>
  <line x1="600" y1="368" x2="690" y2="368" class="arr" marker-end="url(#arrow)"/>
  <line x1="690" y1="390" x2="600" y2="390" class="arr" marker-end="url(#arrow)"/>

  <line x1="480" y1="406" x2="480" y2="440" class="arr" marker-end="url(#arrow)"/>
  <line x1="600" y1="478" x2="690" y2="478" class="arr" marker-end="url(#arrow)"/>
  <line x1="690" y1="500" x2="600" y2="500" class="arr" marker-end="url(#arrow)"/>
  <line x1="360" y1="478" x2="270" y2="586" class="arr" marker-end="url(#arrow)"/>
</svg>