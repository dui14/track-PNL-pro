<svg width="100%" viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 15px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .a rect { fill: #eef4ff; stroke: #34559a; }
      .b rect { fill: #edf9f2; stroke: #24734c; }
      .c rect { fill: #fff6e8; stroke: #905c15; }
      .d rect { fill: #f7eefc; stroke: #663295; }
      .warn rect { fill: #feecec; stroke: #9e3030; }
      .arr { stroke: #66645d; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <text class="title" x="450" y="42" text-anchor="middle">API Key Security and Access Flow</text>

  <g class="a">
    <rect x="220" y="72" width="460" height="66" rx="10" stroke-width="1.1"/>
    <text class="h" x="450" y="99" text-anchor="middle">Receive API key payload on secure endpoint</text>
    <text class="s" x="450" y="122" text-anchor="middle">HTTPS only, JWT required</text>
  </g>

  <g class="c">
    <rect x="220" y="166" width="460" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="450" y="194" text-anchor="middle">Encrypt apiKey and apiSecret immediately</text>
    <text class="s" x="450" y="218" text-anchor="middle">AES-256-GCM + random IV + key_version metadata</text>
  </g>

  <g class="d">
    <rect x="220" y="270" width="460" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="450" y="298" text-anchor="middle">Persist encrypted fields only</text>
    <text class="s" x="450" y="322" text-anchor="middle">api_keys.key_encrypted, secret_encrypted, iv values</text>
  </g>

  <g class="b">
    <rect x="220" y="374" width="460" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="450" y="402" text-anchor="middle">Operational read path in server context</text>
    <text class="s" x="450" y="426" text-anchor="middle">Decrypt only when sync service needs outbound request</text>
  </g>

  <g class="a">
    <rect x="220" y="478" width="460" height="76" rx="10" stroke-width="1.1"/>
    <text class="h" x="450" y="506" text-anchor="middle">Supabase RLS ownership guard</text>
    <text class="s" x="450" y="530" text-anchor="middle">auth.uid() scoped reads/writes for user-owned rows</text>
  </g>

  <g class="warn">
    <rect x="70" y="598" width="300" height="90" rx="10" stroke-width="1.1"/>
    <text class="h" x="220" y="632" text-anchor="middle">Blocked behavior</text>
    <text class="s" x="220" y="656" text-anchor="middle">No plaintext logging and no key fields in API responses</text>
  </g>

  <g class="b">
    <rect x="420" y="598" width="410" height="90" rx="10" stroke-width="1.1"/>
    <text class="h" x="625" y="632" text-anchor="middle">Allowed behavior</text>
    <text class="s" x="625" y="656" text-anchor="middle">Return masked metadata, sync stats, and account status only</text>
  </g>

  <line x1="450" y1="138" x2="450" y2="166" class="arr" marker-end="url(#arrow)"/>
  <line x1="450" y1="242" x2="450" y2="270" class="arr" marker-end="url(#arrow)"/>
  <line x1="450" y1="346" x2="450" y2="374" class="arr" marker-end="url(#arrow)"/>
  <line x1="450" y1="450" x2="450" y2="478" class="arr" marker-end="url(#arrow)"/>
  <line x1="450" y1="554" x2="625" y2="598" class="arr" marker-end="url(#arrow)"/>
  <line x1="350" y1="598" x2="300" y2="554" class="arr" marker-end="url(#arrow)"/>
</svg>