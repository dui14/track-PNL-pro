<svg width="100%" viewBox="0 0 980 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 14px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .a rect { fill: #eef4ff; stroke: #34559a; }
      .b rect { fill: #edf9f2; stroke: #24734c; }
      .c rect { fill: #f7eefc; stroke: #663295; }
      .arr { stroke: #66645d; stroke-width: 1.6; fill: none; }
      .sep { stroke: #b8b5ab; stroke-width: 1; stroke-dasharray: 5 4; }
      .cap { font-size: 12px; fill: #57564f; font-weight: 700; }
    </style>
  </defs>

  <text class="title" x="490" y="42" text-anchor="middle">AI Conversation History Flow</text>
  <line x1="490" y1="80" x2="490" y2="660" class="sep"/>
  <text class="cap" x="245" y="90" text-anchor="middle">List conversation threads</text>
  <text class="cap" x="735" y="90" text-anchor="middle">Load messages in thread</text>

  <g class="a">
    <rect x="70" y="120" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="245" y="148" text-anchor="middle">GET /api/ai/conversations</text>
    <text class="s" x="245" y="171" text-anchor="middle">Load sidebar items for current user</text>
  </g>

  <g class="b">
    <rect x="70" y="220" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="245" y="248" text-anchor="middle">JWT and ownership validation</text>
    <text class="s" x="245" y="271" text-anchor="middle">Query chat_conversations by user_id</text>
  </g>

  <g class="c">
    <rect x="70" y="320" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="245" y="348" text-anchor="middle">Sort by updated_at DESC</text>
    <text class="s" x="245" y="371" text-anchor="middle">Return id, title, updated_at</text>
  </g>

  <g class="a">
    <rect x="560" y="120" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="735" y="148" text-anchor="middle">GET /api/ai/conversations/:id/messages</text>
    <text class="s" x="735" y="171" text-anchor="middle">User selects a thread in sidebar</text>
  </g>

  <g class="b">
    <rect x="560" y="220" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="735" y="248" text-anchor="middle">Validate thread belongs to user</text>
    <text class="s" x="735" y="271" text-anchor="middle">RLS policy via chat_conversations owner</text>
  </g>

  <g class="c">
    <rect x="560" y="320" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="735" y="348" text-anchor="middle">Query chat_messages in ASC time order</text>
    <text class="s" x="735" y="371" text-anchor="middle">role, content, created_at</text>
  </g>

  <g class="a">
    <rect x="560" y="420" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="735" y="448" text-anchor="middle">Return message timeline</text>
    <text class="s" x="735" y="471" text-anchor="middle">UI renders historical chat transcript</text>
  </g>

  <g class="b">
    <rect x="315" y="540" width="350" height="90" rx="10" stroke-width="1.1"/>
    <text class="h" x="490" y="574" text-anchor="middle">Continue conversation</text>
    <text class="s" x="490" y="598" text-anchor="middle">Selected conversationId is reused by POST /api/ai/chat</text>
  </g>

  <line x1="245" y1="190" x2="245" y2="220" class="arr" marker-end="url(#arrow)"/>
  <line x1="245" y1="290" x2="245" y2="320" class="arr" marker-end="url(#arrow)"/>
  <line x1="735" y1="190" x2="735" y2="220" class="arr" marker-end="url(#arrow)"/>
  <line x1="735" y1="290" x2="735" y2="320" class="arr" marker-end="url(#arrow)"/>
  <line x1="735" y1="390" x2="735" y2="420" class="arr" marker-end="url(#arrow)"/>

  <line x1="420" y1="355" x2="560" y2="155" class="arr" marker-end="url(#arrow)"/>
  <line x1="735" y1="490" x2="610" y2="540" class="arr" marker-end="url(#arrow)"/>
</svg>