<svg width="100%" viewBox="0 0 980 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1d1d1b; }
      .title { font-size: 24px; font-weight: 700; }
      .h { font-size: 14px; font-weight: 700; }
      .s { font-size: 12px; font-weight: 500; }
      .a rect { fill: #eef4ff; stroke: #34559a; }
      .b rect { fill: #edf9f2; stroke: #24734c; }
      .c rect { fill: #fff6e8; stroke: #8f5b14; }
      .arr { stroke: #66645d; stroke-width: 1.6; fill: none; }
      .sep { stroke: #b8b5ab; stroke-width: 1; stroke-dasharray: 5 4; }
      .cap { font-size: 12px; fill: #57564f; font-weight: 700; }
    </style>
  </defs>

  <text class="title" x="490" y="42" text-anchor="middle">Exchange Accounts Management Flow</text>
  <line x1="490" y1="80" x2="490" y2="660" class="sep"/>
  <text class="cap" x="245" y="90" text-anchor="middle">Read accounts</text>
  <text class="cap" x="735" y="90" text-anchor="middle">Update or delete account</text>

  <g class="a">
    <rect x="70" y="120" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="245" y="148" text-anchor="middle">GET /api/exchange/accounts</text>
    <text class="s" x="245" y="171" text-anchor="middle">Fetch all exchange accounts for logged-in user</text>
  </g>

  <g class="b">
    <rect x="70" y="220" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="245" y="248" text-anchor="middle">JWT validation + ownership scope</text>
    <text class="s" x="245" y="271" text-anchor="middle">No key_encrypted or secret fields returned</text>
  </g>

  <g class="c">
    <rect x="70" y="320" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="245" y="348" text-anchor="middle">Query exchange_accounts table</text>
    <text class="s" x="245" y="371" text-anchor="middle">id, exchange, label, is_active, last_synced</text>
  </g>

  <g class="a">
    <rect x="70" y="420" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="245" y="448" text-anchor="middle">Return account list to UI</text>
    <text class="s" x="245" y="471" text-anchor="middle">Manage switches and sync action buttons</text>
  </g>

  <g class="a">
    <rect x="560" y="120" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="735" y="148" text-anchor="middle">PATCH /api/exchange/accounts/:id</text>
    <text class="s" x="735" y="171" text-anchor="middle">Update label or is_active flag</text>
  </g>

  <g class="b">
    <rect x="560" y="220" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="735" y="248" text-anchor="middle">DELETE /api/exchange/accounts/:id</text>
    <text class="s" x="735" y="271" text-anchor="middle">Remove exchange account and linked data</text>
  </g>

  <g class="c">
    <rect x="560" y="320" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="735" y="348" text-anchor="middle">Ownership verification in SQL scope</text>
    <text class="s" x="735" y="371" text-anchor="middle">WHERE id = :id AND user_id = auth.uid()</text>
  </g>

  <g class="a">
    <rect x="560" y="420" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="735" y="448" text-anchor="middle">Persist update or cascade delete</text>
    <text class="s" x="735" y="471" text-anchor="middle">api_keys, trades, snapshots removed on delete</text>
  </g>

  <g class="b">
    <rect x="560" y="520" width="350" height="70" rx="10" stroke-width="1.1"/>
    <text class="h" x="735" y="548" text-anchor="middle">Return success envelope</text>
    <text class="s" x="735" y="571" text-anchor="middle">UI refreshes account list and status badges</text>
  </g>

  <line x1="245" y1="190" x2="245" y2="220" class="arr" marker-end="url(#arrow)"/>
  <line x1="245" y1="290" x2="245" y2="320" class="arr" marker-end="url(#arrow)"/>
  <line x1="245" y1="390" x2="245" y2="420" class="arr" marker-end="url(#arrow)"/>

  <line x1="735" y1="190" x2="735" y2="220" class="arr" marker-end="url(#arrow)"/>
  <line x1="735" y1="290" x2="735" y2="320" class="arr" marker-end="url(#arrow)"/>
  <line x1="735" y1="390" x2="735" y2="420" class="arr" marker-end="url(#arrow)"/>
  <line x1="735" y1="490" x2="735" y2="520" class="arr" marker-end="url(#arrow)"/>
</svg>